services:
  postgres:
    image: postgres:16
    container_name: organizer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: organizer_db
      POSTGRES_USER: organizer_user
      POSTGRES_PASSWORD: organizer_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
