services:
  postgres:
    image: postgres:16
    container_name: organizer_postgres_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data_prod:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: organizer_backend_prod
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env.prod
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: organizer_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env.prod
    ports:
      - "8550:8550"

volumes:
  pg_data_prod:
